app = "changedetection-io-wcxoxq"
primary_region = "ewr"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "changedetection_data"
  destination = "/datastore"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
