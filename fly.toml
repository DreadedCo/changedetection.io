# fly.toml app configuration file generated for changedetection-io-wcxoxq on 2026-06-23T04:36:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'changedetection-io-wcxoxq'
primary_region = 'ewr'

[build]

[env]
  PORT = '8080'

[[mounts]]
  source = 'changedetection_data'
  destination = '/datastore'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
